name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      action:
        description: 'The action to run with git-tag-inc (e.g., "patch", "minor", "major").'
        required: true
        default: 'patch'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run git-tag-inc-action
        id: git-tag-inc
        if: github.event_name == 'workflow_dispatch'
        uses: arran4/git-tag-inc-action@main
        with:
          action: ${{ github.event.inputs.action }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Push new tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git push origin ${{ steps.git-tag-inc.outputs.version }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build GoReleaser from PR branch
        run: |
          git clone --depth=1 \
            --branch gentoo-ebuild-support-1288548533621874886 \
            https://github.com/arran4/goreleaser.git \
            /tmp/goreleaser-pr
          cd /tmp/goreleaser-pr
          go install .
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GENTOO_OVERLAY_TOKEN: ${{ secrets.GENTOO_OVERLAY_TOKEN }}
        run: |
          goreleaser release --clean
