name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      action:
        description: 'The action to run with git-tag-inc'
        type: choice
        required: true
        default: 'patch'
        options:
          - patch
          - minor
          - major
          - release
          - test
          - uat
          - alpha
          - beta
          - rc
          - next
      force:
        description: 'Force'
        type: boolean
        required: true
        default: true
      goreleaser_branch:
        description: 'The branch to get goreleaser source from'
        type: string
        required: false
        default: 'feature/gentoo-ebuild'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run git-tag-inc-action
        id: git-tag-inc
        if: github.event_name == 'workflow_dispatch'
        uses: arran4/git-tag-inc-action@main
        with:
          action: ${{ inputs.force == true && '--force ' || '' }}${{ inputs.action }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Push new tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git push origin ${{ steps.git-tag-inc.outputs.version }}
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build GoReleaser from PR branch
        run: |
          git clone --depth=1 \
            --branch ${{ inputs.goreleaser_branch || 'feature/gentoo-ebuild' }} \
            https://github.com/arran4/goreleaser.git \
            /tmp/goreleaser-pr
          cd /tmp/goreleaser-pr
          go install .
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GENTOO_OVERLAY_TOKEN: ${{ secrets.GENTOO_OVERLAY_TOKEN }}
        run: |
          goreleaser release --clean
