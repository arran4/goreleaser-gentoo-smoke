version: 2

project_name: goreleaser-gentoo-smoke

builds:
  - id: default
    main: .
    binary: goreleaser-gentoo-smoke
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - goreleaser-gentoo-smoke.1
      - config.yaml

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: arran4
    name: goreleaser-gentoo-smoke

gentoos:
  - name: goreleaser-gentoo-smoke
    bin: true
    type: bin
    repository:
      owner: arran4
      name: goreleaser-gentoo-smoke-overlay
      branch: main
      token: "{{ .Env.GENTOO_OVERLAY_TOKEN }}"
      pull_request:
        enabled: true
    homepage: https://github.com/arran4/goreleaser-gentoo-smoke
    description: Disposable GoReleaser Gentoo ebuild smoke test
    license: MIT
    keywords:
      - ~amd64
      - ~arm64

    files:
      - goreleaser-gentoo-smoke.1
      - config.yaml
      - systemd-service.service
      - initd-script.sh

    doins:
      - src: config.yaml
        dst: /etc/goreleaser-gentoo-smoke/goreleaser-gentoo-smoke.conf

    doman:
      - goreleaser-gentoo-smoke.1

    useflags:
      - flag: systemd
        description: enables systemd installation

    systemd:
      - src: systemd-service.service
        use: [systemd]

    doinitd:
      - src: initd-script.sh
        dst: /etc/init.d/goreleaser-gentoo-smoke
        use: [systemd]

    dosym:
      - src: /usr/bin/goreleaser-gentoo-smoke
        dst: /usr/bin/ggs

    keep_versions: 2
    commit_msg_template: "app-misc/goreleaser-gentoo-smoke-bin: bump to {{ .Tag }}"
