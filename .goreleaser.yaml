version: 2

project_name: goreleaser-gentoo-smoke

builds:
  - id: default
    main: .
    binary: goreleaser-gentoo-smoke
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE
      - goreleaser-gentoo-smoke.1
      - config.yaml

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: arran4
    name: goreleaser-gentoo-smoke

brews:
  - name: goreleaser-gentoo-smoke
    repository:
      owner: arran4
      name: homebrew-goreleaser-gentoo-smoke
    install: |
      bin.install "goreleaser-gentoo-smoke"
      man1.install "goreleaser-gentoo-smoke.1"
      etc.install "config.yaml"

nfpms:
  - id: default
    package_name: goreleaser-gentoo-smoke
    vendor: arran4
    homepage: https://github.com/arran4/goreleaser-gentoo-smoke
    maintainer: arran4
    description: Disposable GoReleaser Gentoo ebuild smoke test
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: goreleaser-gentoo-smoke.1
        dst: /usr/share/man/man1/goreleaser-gentoo-smoke.1
      - src: config.yaml
        dst: /etc/goreleaser-gentoo-smoke/config.yaml
        type: config

gentoos:
  - name: goreleaser-gentoo-smoke
    bin: true
    type: bin
    repository:
      owner: arran4
      name: goreleaser-gentoo-smoke-overlay
      branch: main
      token: "{{ .Env.GENTOO_OVERLAY_TOKEN }}"
      pull_request:
        enabled: true
    homepage: https://github.com/arran4/goreleaser-gentoo-smoke
    description: Disposable GoReleaser Gentoo ebuild smoke test
    license: MIT
    keywords:
      - ~amd64
      - ~arm64
    keep_versions: 2
    commit_msg_template: "app-misc/goreleaser-gentoo-smoke-bin: bump to {{ .Tag }}"
